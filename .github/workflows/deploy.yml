name: Deploy to Orange Pi

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/My/webSite
            # 1. Принудительно обновляем код до состояния в GitHub
            git fetch --all
            git reset --hard origin/main
            
            # 2. Обновляем зависимости внутри venv
            # (Убедись, что файл requirements.txt есть в репозитории)
            if [ -f requirements.txt ]; then
              ./venv/bin/pip install -r requirements.txt
            fi
            
            # 3. Перезапускаем системный сервис
            # (Мы разрешили это делать без пароля через visudo)
            sudo systemctl restart my-website.service
            
            # 4. Проверяем статус, чтобы увидеть в логах GitHub, что всё ок
            systemctl is-active my-website.service
